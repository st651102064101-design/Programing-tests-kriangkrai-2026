<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Users</title>
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
</head>
<body>
    <h1>Users</h1>
    <div id="content">Loading...</div>
    <script>
    const content = document.getElementById('content');

    fetch('https://dummyjson.com/users')
      .then(r => r.ok ? r.json() : Promise.reject('Network error'))
      .then(data => {
        const users = data.users || [];
        if (!users.length) return content.textContent = 'No users';
        const rows = users.map(u =>
          `<tr><td>${u.id}</td><td>${u.firstName} ${u.lastName}</td><td>${u.email}</td><td>${u.phone}</td></tr>`
        ).join('');
        content.innerHTML = `<table id="users" class="table table-striped">
          <thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Phone</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
        $('#users').DataTable();
      })
      .catch(() => content.textContent = 'Error');
    </script>
</body>
</html>
